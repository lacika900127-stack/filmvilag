<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>FilmStream Pro - SEO Admin</title>
    <meta name="description" content="FilmStream Pro - filmelőzetesek, kategóriák, közösség, SEO testreszabással">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            background: #0a0a0a;
            color: #eee;
        }
        .navbar {
            background: #111;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            border-bottom: 1px solid #2c2c2c;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            font-size: 1.6rem;
            font-weight: bold;
            background: linear-gradient(135deg, #E50914, #ff4d4d);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .nav-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }
        .nav-links a {
            color: #ddd;
            text-decoration: none;
            cursor: pointer;
        }
        .nav-links a:hover {
            color: #E50914;
        }
        .user-panel {
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        button, .btn {
            background: #2c2c2c;
            border: none;
            color: white;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            cursor: pointer;
        }
        .btn-red {
            background: #E50914;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }
        .carousel-section {
            margin-bottom: 2rem;
        }
        .carousel-container {
            position: relative;
            overflow: hidden;
            margin: 1rem 0;
        }
        .carousel-track {
            display: flex;
            transition: transform 0.5s ease;
            gap: 1.5rem;
        }
        .carousel-card {
            flex: 0 0 calc(20% - 1.2rem);
            min-width: 180px;
            background: #151515;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .carousel-card:hover {
            transform: scale(1.02);
        }
        .carousel-poster {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
        }
        .carousel-info {
            padding: 0.6rem;
        }
        .carousel-title {
            font-weight: 600;
            font-size: 0.9rem;
        }
        .carousel-year {
            font-size: 0.7rem;
            color: #aaa;
        }
        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.6);
            border: none;
            color: white;
            font-size: 2rem;
            padding: 0 1rem;
            cursor: pointer;
            z-index: 2;
            border-radius: 30px;
        }
        .carousel-btn-left { left: 5px; }
        .carousel-btn-right { right: 5px; }
        .categories-filter {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin: 1.5rem 0;
        }
        .cat-btn {
            background: #222;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
        }
        .cat-btn.active, .cat-btn:hover {
            background: #E50914;
        }
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.8rem;
            margin-top: 1.5rem;
        }
        .movie-card {
            background: #151515;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .movie-card:hover {
            transform: scale(1.03);
        }
        .movie-poster {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
        }
        .movie-info {
            padding: 0.8rem;
        }
        .film-page {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
        }
        .film-main {
            flex: 2;
            min-width: 250px;
        }
        .film-sidebar {
            flex: 1;
            min-width: 250px;
        }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            background: black;
            margin-bottom: 1rem;
        }
        .video-wrapper iframe, .video-wrapper video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .comment {
            background: #1a1a1a;
            padding: 0.8rem;
            border-radius: 10px;
            margin-top: 0.8rem;
        }
        .admin-section {
            background: #111;
            padding: 1.5rem;
            border-radius: 20px;
            margin-top: 1rem;
        }
        .reklam-item, .category-item, .seo-item {
            background: #222;
            padding: 1rem;
            margin: 1rem 0;
            border-radius: 12px;
        }
        .ad-space {
            margin: 1rem 0;
            background: #1a1a1a;
            border: 1px dashed #E50914;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        input, textarea, select {
            background: #1e1e1e;
            border: 1px solid #3a3a3a;
            padding: 0.5rem;
            border-radius: 8px;
            color: white;
            width: 100%;
            margin-bottom: 0.5rem;
        }
        @media (max-width: 1000px) {
            .carousel-card { flex: 0 0 calc(25% - 1.2rem); }
        }
        @media (max-width: 700px) {
            .carousel-card { flex: 0 0 calc(33% - 1rem); }
            .navbar { flex-direction: column; }
        }
        @media (max-width: 500px) {
            .carousel-card { flex: 0 0 calc(50% - 0.8rem); }
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="logo">🎬 FilmStream PRO</div>
    <div class="nav-links">
        <a onclick="navigateTo('home')">🏠 Főoldal</a>
        <a onclick="navigateTo('admin')" id="adminLink">🔧 Admin</a>
    </div>
    <div class="user-panel" id="userPanel"></div>
</div>

<div id="appRoot" class="container"></div>

<script>
    // ----------------------------- ADAT MODELLEK (localStorage) -----------------------------
    let movies = [];        // {id, title, year, description, videoUrl, posterUrl, categoryId, createdAt, metaTitle, metaDescription, slug, altText}
    let categories = [];    // {id, name}
    let ads = [];
    let users = [];
    let comments = [];
    let likes = [];

    let currentUser = null;
    let carouselInterval = null;
    let currentCarouselIndex = 0;
    let activeCategoryId = null;  // null = összes

    // ---------- Helper ----------
    function saveData() {
        localStorage.setItem('filmstream_movies', JSON.stringify(movies));
        localStorage.setItem('filmstream_categories', JSON.stringify(categories));
        localStorage.setItem('filmstream_ads', JSON.stringify(ads));
        localStorage.setItem('filmstream_users', JSON.stringify(users));
        localStorage.setItem('filmstream_comments', JSON.stringify(comments));
        localStorage.setItem('filmstream_likes', JSON.stringify(likes));
    }

    function loadData() {
        movies = JSON.parse(localStorage.getItem('filmstream_movies')) || [];
        categories = JSON.parse(localStorage.getItem('filmstream_categories')) || [];
        ads = JSON.parse(localStorage.getItem('filmstream_ads')) || [];
        users = JSON.parse(localStorage.getItem('filmstream_users')) || [];
        comments = JSON.parse(localStorage.getItem('filmstream_comments')) || [];
        likes = JSON.parse(localStorage.getItem('filmstream_likes')) || [];

        // Alapadatok
        if(categories.length === 0) {
            categories = [
                {id: 1, name: "Akció"},
                {id: 2, name: "Dráma"},
                {id: 3, name: "Vígjáték"},
                {id: 4, name: "Sci-fi"}
            ];
        }
        if(movies.length === 0) {
            const now = Date.now();
            movies = [
                {id: 1, title: "Eredet", year: 2010, description: "Álomtolvajok különleges küldetése.", videoUrl: "https://www.youtube.com/embed/YoHD9XEInc0", posterUrl: "https://image.tmdb.org/t/p/w500/9gk7adHYeDvHkCSEqAvQNLV5Uge.jpg", categoryId: 4, createdAt: now - 86400000, metaTitle: "Eredet (2010) - teljes film előzetes", metaDescription: "Nézd meg az Eredet (Inception) előzetesét. Christopher Nolan sci-fi thrillerje Leonardo DiCaprióval.", slug: "eredet-2010", altText: "Eredet film plakát, Leonardo DiCaprio"},
                {id: 2, title: "A Sötét Lovag", year: 2008, description: "Batman és Joker harca Gothamben.", videoUrl: "https://www.youtube.com/embed/EXeTwQWrcwY", posterUrl: "https://image.tmdb.org/t/p/w500/qJ2tW6WMUDux911r6m7haRef0WH.jpg", categoryId: 1, createdAt: now - 172800000, metaTitle: "A Sötét Lovag (2008) - előzetes", metaDescription: "A Sötét Lovag előzetese - Christian Bale, Heath Ledger. A filmtörténet egyik legjobb szuperhősfilmje.", slug: "sotet-lovag-2008", altText: "A Sötét Lovag plakát, Batman"},
                {id: 3, title: "Ponyvaregény", year: 1994, description: "Tarantino klasszikusa.", videoUrl: "https://www.youtube.com/embed/s7EdQ4FqbhY", posterUrl: "https://image.tmdb.org/t/p/w500/d5iIlFn5s0ImszYzBPb8JPIfbXD.jpg", categoryId: 2, createdAt: now - 259200000, metaTitle: "Ponyvaregény (1994) - előzetes", metaDescription: "Quentin Tarantino kultuszfilmjének előzetese. John Travolta, Uma Thurman.", slug: "ponyvaregeny-1994", altText: "Ponyvaregény filmplakát"},
                {id: 4, title: "Mátrix", year: 1999, description: "Virtuális valóság és lázadás.", videoUrl: "https://www.youtube.com/embed/vKQi3bBA1y8", posterUrl: "https://image.tmdb.org/t/p/w500/f89U3ADr1oiB1s9GkdPOEpXUk5H.jpg", categoryId: 4, createdAt: now - 345600000, metaTitle: "Mátrix (1999) - előzetes", metaDescription: "A Mátrix előzetese - Keanu Reeves, science-fiction klasszikus.", slug: "matrix-1999", altText: "Mátrix film plakát, Neo"},
                {id: 5, title: "Csillagok között", year: 2014, description: "Űrutazás a megváltásért.", videoUrl: "https://www.youtube.com/embed/zSWdZVtXT7E", posterUrl: "https://image.tmdb.org/t/p/w500/gEU2QniE6E77NI6lCU6MxlNBvIx.jpg", categoryId: 4, createdAt: now - 432000000, metaTitle: "Csillagok között (2014) - előzetes", metaDescription: "Christopher Nolan űrkalandja. Nézd meg az előzetest!", slug: "csillagok-kozott-2014", altText: "Csillagok között filmplakát"},
                {id: 6, title: "Harcosok Klubja", year: 1999, description: "Fight Club - szabályok.", videoUrl: "https://www.youtube.com/embed/SUXWAEX2jlg", posterUrl: "https://image.tmdb.org/t/p/w500/pB8BM7DSpv9e9NhaLFcH82cShSg.jpg", categoryId: 2, createdAt: now - 518400000, metaTitle: "Harcosok Klubja (1999) - előzetes", metaDescription: "A Harcosok Klubja előzetese Brad Pitt és Edward Norton főszereplésével.", slug: "harcosok-klubja-1999", altText: "Harcosok Klubja plakát"},
                {id: 7, title: "Forrest Gump", year: 1994, description: "Az élet olyan, mint egy doboz csoki.", videoUrl: "https://www.youtube.com/embed/bLvqoHBptjg", posterUrl: "https://image.tmdb.org/t/p/w500/arw2vcBveWOVZr6pxd9YnO3fsHz.jpg", categoryId: 2, createdAt: now - 604800000, metaTitle: "Forrest Gump (1994) - előzetes", metaDescription: "Forrest Gump előzetes - Tom Hanks, hat Oscar-díj.", slug: "forrest-gump-1994", altText: "Forrest Gump filmplakát"},
                {id: 8, title: "Whiplash", year: 2014, description: "Dobolás a tökéletességért.", videoUrl: "https://www.youtube.com/embed/7d_jQycdQGo", posterUrl: "https://image.tmdb.org/t/p/w500/6uUy2OkAgiupEhQJvMSm7c3cS3.jpg", categoryId: 2, createdAt: now - 691200000, metaTitle: "Whiplash (2014) - előzetes", metaDescription: "Whiplash előzetes - a tökéletesség ára. Oscar-díjas film.", slug: "whiplash-2014", altText: "Whiplash filmplakát"}
            ];
        }
        // Ellenőrizzük, hogy a régi filmeknél vannak-e az új SEO mezők
        movies.forEach(m => {
            if (!m.metaTitle) m.metaTitle = m.title;
            if (!m.metaDescription) m.metaDescription = m.description.substring(0, 160);
            if (!m.slug) m.slug = m.title.toLowerCase().replace(/[^a-z0-9]+/g, '-');
            if (!m.altText) m.altText = `${m.title} (${m.year}) filmplakát`;
        });
        if(ads.length === 0) {
            ads.push({id: 1, name: "Főoldal teteje", position: "home_top", width: "728", height: "90", code: "<img src='https://placehold.co/728x90/ff0000/white?text=REKLAM' style='width:100%'>", active: true});
            ads.push({id: 2, name: "Film oldalsáv", position: "film_sidebar", width: "300", height: "250", code: "<img src='https://placehold.co/300x250/00aaff/white?text=300x250' style='width:100%'>", active: true});
        }
        if(users.length === 0) {
            users.push({id: 1, username: "admin", email: "admin@film.hu", password: "admin123"});
            users.push({id: 2, username: "teszt", email: "teszt@mail.com", password: "123456"});
        }
        saveData();
    }

    // Legfrissebb 8 film
    function getLatestMovies() {
        return [...movies].sort((a,b) => b.createdAt - a.createdAt).slice(0, 8);
    }

    // Reklám render
    function renderAdByPosition(position) {
        let ad = ads.find(a => a.position === position && a.active);
        if(!ad) return '<div class="ad-placeholder">📢 Reklám hely</div>';
        return `<div class="ad-space" style="max-width:${ad.width}px; margin:0 auto;">${ad.code}</div>`;
    }

    // Like & comment
    function isMovieLiked(movieId) {
        if(!currentUser) return false;
        return likes.some(l => l.userId === currentUser.id && l.movieId === movieId);
    }
    function toggleLike(movieId) {
        if(!currentUser) { alert("Jelentkezz be a like-hoz!"); return false; }
        const idx = likes.findIndex(l => l.userId === currentUser.id && l.movieId === movieId);
        if(idx === -1) likes.push({userId: currentUser.id, movieId: movieId});
        else likes.splice(idx,1);
        saveData();
        return true;
    }
    function getLikeCount(movieId) {
        return likes.filter(l => l.movieId === movieId).length;
    }
    function addComment(movieId, text) {
        if(!currentUser) { alert("Be kell jelentkezned!"); return false; }
        if(!text.trim()) return false;
        comments.push({id: Date.now(), movieId, userId: currentUser.id, username: currentUser.username, text, date: new Date().toLocaleString()});
        saveData();
        return true;
    }
    function getComments(movieId) {
        return comments.filter(c => c.movieId === movieId).sort((a,b)=>b.id - a.id);
    }

    // ---------- CAROUSEL ----------
    function startCarousel() {
        if(carouselInterval) clearInterval(carouselInterval);
        carouselInterval = setInterval(() => {
            const latest = getLatestMovies();
            if(latest.length <= 5) return;
            currentCarouselIndex = (currentCarouselIndex + 1) % (latest.length - 4);
            renderCarousel();
        }, 4000);
    }
    function renderCarousel() {
        const latest = getLatestMovies();
        if(latest.length === 0) return;
        const track = document.querySelector('.carousel-track');
        if(!track) return;
        const cardWidth = document.querySelector('.carousel-card')?.offsetWidth + 24;
        if(!cardWidth) return;
        const offset = currentCarouselIndex * cardWidth;
        track.style.transform = `translateX(-${offset}px)`;
    }
    function moveCarousel(direction) {
        const latest = getLatestMovies();
        if(latest.length <= 5) return;
        const maxIndex = latest.length - 5;
        let newIndex = currentCarouselIndex + direction;
        if(newIndex < 0) newIndex = maxIndex;
        if(newIndex > maxIndex) newIndex = 0;
        currentCarouselIndex = newIndex;
        renderCarousel();
        if(carouselInterval) { clearInterval(carouselInterval); startCarousel(); }
    }

    // ---------- SEO META FRISSÍTÉS ----------
    function updateMetaForMovie(movie) {
        if(!movie) return;
        document.title = movie.metaTitle || movie.title;
        let metaDesc = document.querySelector('meta[name="description"]');
        if(!metaDesc) { metaDesc = document.createElement('meta'); metaDesc.name = "description"; document.head.appendChild(metaDesc); }
        metaDesc.content = movie.metaDescription || movie.description.substring(0,160);
        // Open Graph
        let ogTitle = document.querySelector('meta[property="og:title"]');
        if(!ogTitle) { ogTitle = document.createElement('meta'); ogTitle.setAttribute('property','og:title'); document.head.appendChild(ogTitle); }
        ogTitle.content = movie.metaTitle || movie.title;
        let ogDesc = document.querySelector('meta[property="og:description"]');
        if(!ogDesc) { ogDesc = document.createElement('meta'); ogDesc.setAttribute('property','og:description'); document.head.appendChild(ogDesc); }
        ogDesc.content = movie.metaDescription || movie.description;
        let ogImage = document.querySelector('meta[property="og:image"]');
        if(!ogImage) { ogImage = document.createElement('meta'); ogImage.setAttribute('property','og:image'); document.head.appendChild(ogImage); }
        ogImage.content = movie.posterUrl;
        let ogUrl = document.querySelector('meta[property="og:url"]');
        if(!ogUrl) { ogUrl = document.createElement('meta'); ogUrl.setAttribute('property','og:url'); document.head.appendChild(ogUrl); }
        ogUrl.content = window.location.href;
        let twitterCard = document.querySelector('meta[name="twitter:card"]');
        if(!twitterCard) { twitterCard = document.createElement('meta'); twitterCard.name = "twitter:card"; twitterCard.content = "summary_large_image"; document.head.appendChild(twitterCard); }
    }
    function resetMetaToDefault() {
        document.title = "FilmStream Pro - SEO Admin";
        let metaDesc = document.querySelector('meta[name="description"]');
        if(metaDesc) metaDesc.content = "FilmStream Pro - filmelőzetesek, kategóriák, közösség, SEO testreszabással";
        let ogTitle = document.querySelector('meta[property="og:title"]');
        if(ogTitle) ogTitle.content = "FilmStream Pro";
        let ogDesc = document.querySelector('meta[property="og:description"]');
        if(ogDesc) ogDesc.content = "Nézd meg a legjobb filmelőzeteseket, kommentelj, like-olj!";
        let ogImage = document.querySelector('meta[property="og:image"]');
        if(ogImage) ogImage.content = "";
    }

    // ---------- UI RENDERELÉSEK ----------
    function renderHome() {
        const latest = getLatestMovies();
        const topAd = renderAdByPosition('home_top');
        let carouselHtml = `
            <div class="carousel-section">
                <h2 style="margin-bottom:0.5rem;">🎞️ Legfrissebb filmek (8)</h2>
                <div class="carousel-container">
                    <button class="carousel-btn carousel-btn-left" onclick="moveCarousel(-1)">❮</button>
                    <div class="carousel-track" style="display: flex; gap: 1.5rem;">
                        ${latest.map(m => `
                            <div class="carousel-card" onclick="navigateTo('movie', ${m.id})">
                                <img class="carousel-poster" src="${m.posterUrl}" alt="${m.altText}" onerror="this.src='https://placehold.co/300x450/333/white?text=No+Poster'">
                                <div class="carousel-info">
                                    <div class="carousel-title">${m.title} (${m.year})</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <button class="carousel-btn carousel-btn-right" onclick="moveCarousel(1)">❯</button>
                </div>
            </div>
        `;
        let catButtons = `<div class="categories-filter">
            <div class="cat-btn ${activeCategoryId === null ? 'active' : ''}" onclick="setCategoryFilter(null)">Összes</div>
            ${categories.map(cat => `<div class="cat-btn ${activeCategoryId === cat.id ? 'active' : ''}" onclick="setCategoryFilter(${cat.id})">${cat.name}</div>`).join('')}
        </div>`;
        let filteredMovies = activeCategoryId === null ? movies : movies.filter(m => m.categoryId === activeCategoryId);
        let gridHtml = `<div class="movies-grid" id="categoryGrid">
            ${filteredMovies.map(m => `
                <div class="movie-card" onclick="navigateTo('movie', ${m.id})">
                    <img class="movie-poster" src="${m.posterUrl}" alt="${m.altText}" onerror="this.src='https://placehold.co/300x450/333/white?text=No+Poster'">
                    <div class="movie-info">
                        <div class="movie-title">${m.title} (${m.year})</div>
                    </div>
                </div>
            `).join('')}
        </div>`;
        if(filteredMovies.length === 0) gridHtml = '<p>Nincs film ebben a kategóriában.</p>';
        return `${topAd}${carouselHtml}${catButtons}${gridHtml}`;
    }

    function renderFilmPage(movieId) {
        const movie = movies.find(m => m.id == movieId);
        if(!movie) return "<h2>Film nem található</h2>";
        // SEO meta frissítés
        updateMetaForMovie(movie);
        // Schema.org struktúrált adatok (JSON-LD)
        const schemaData = {
            "@context": "https://schema.org",
            "@type": "Movie",
            "name": movie.title,
            "datePublished": movie.year,
            "description": movie.description,
            "image": movie.posterUrl,
            "url": window.location.href
        };
        let existingScript = document.getElementById('schemaOrg');
        if(existingScript) existingScript.remove();
        const script = document.createElement('script');
        script.id = 'schemaOrg';
        script.type = 'application/ld+json';
        script.textContent = JSON.stringify(schemaData);
        document.head.appendChild(script);

        const liked = isMovieLiked(movie.id);
        const likeCount = getLikeCount(movie.id);
        const commentsList = getComments(movie.id);
        const sidebarAd = renderAdByPosition('film_sidebar');
        const categoryName = categories.find(c => c.id === movie.categoryId)?.name || "Nincs";
        let commentsHtml = commentsList.map(c => `<div class="comment"><span class="comment-user">${c.username}</span> <small>${c.date}</small><p>${c.text}</p></div>`).join('');
        if(commentsHtml === '') commentsHtml = '<p>Még nincs hozzászólás.</p>';
        return `
            <div class="film-page">
                <div class="film-main">
                    <div class="video-wrapper">
                        ${movie.videoUrl.includes('youtube') || movie.videoUrl.includes('embed') ? 
                            `<iframe src="${movie.videoUrl}" frameborder="0" allowfullscreen></iframe>` :
                            `<video controls src="${movie.videoUrl}" style="width:100%; height:100%;"></video>`}
                    </div>
                    <h1>${movie.title} (${movie.year})</h1>
                    <p><strong>Kategória:</strong> ${categoryName}</p>
                    <p><strong>Leírás:</strong> ${movie.description}</p>
                    <div style="display:flex; gap:1rem; margin:1rem 0;">
                        <button class="like-btn ${liked ? 'liked' : ''}" onclick="handleLike(${movie.id})"><i class="fas fa-thumbs-up"></i> ${likeCount}</button>
                    </div>
                    <hr>
                    <h3>💬 Hozzászólások</h3>
                    <div id="commentList">${commentsHtml}</div>
                    ${currentUser ? `<textarea id="newCommentText" rows="2" placeholder="Írd ide a véleményed..." style="width:100%; margin:1rem 0;"></textarea>
                                    <button onclick="submitComment(${movie.id})">Komment küldése</button>` : 
                                    `<p><i class="fas fa-lock"></i> <a onclick="navigateTo('login')">Jelentkezz be</a> a kommenteléshez.</p>`}
                </div>
                <div class="film-sidebar">
                    ${sidebarAd}
                    <div class="admin-section" style="background:#1e1e1e; margin-top:1rem;">
                        <small>📢 További tartalom</small>
                    </div>
                </div>
            </div>
        `;
    }

    // Admin felület (bővítve SEO mezőkkel)
    function renderAdmin() {
        if(!currentUser || currentUser.username !== 'admin') {
            return `<div class="admin-section"><h2>Admin belépés</h2><input type="password" id="adminPass" placeholder="Admin jelszó"><br><button onclick="adminLogin()">Belépés</button><p>Alap jelszó: admin123</p></div>`;
        }
        let moviesAdmin = movies.map(m => `
            <div class="reklam-item">
                <strong>${m.title}</strong> (${m.year}) - Kategória: ${categories.find(c=>c.id===m.categoryId)?.name || '?'}
                <button onclick="editMovie(${m.id})">✏️ Szerkeszt</button>
                <button onclick="deleteMovie(${m.id})">🗑️ Töröl</button>
            </div>
        `).join('');
        let categoriesAdmin = categories.map(c => `
            <div class="category-item">
                ${c.name} (ID: ${c.id})
                <button onclick="deleteCategory(${c.id})">Törlés</button>
            </div>
        `).join('');
        return `
            <h1>🔧 Admin Panel - Teljes SEO Kontroll</h1>
            <div class="admin-section">
                <h2>🎬 Filmek kezelése (SEO mezőkkel)</h2>
                <button onclick="showAddMovieForm()">+ Új film</button>
                <div id="movieFormContainer"></div>
                <div>${moviesAdmin}</div>
            </div>
            <div class="admin-section">
                <h2>📂 Kategóriák</h2>
                <input type="text" id="newCatName" placeholder="Új kategória neve">
                <button onclick="addCategory()">Hozzáadás</button>
                <div>${categoriesAdmin}</div>
            </div>
            <div class="admin-section">
                <h2>📢 Reklámok</h2>
                ${ads.map(ad => `
                    <div class="reklam-item">
                        <b>${ad.name}</b> (${ad.position})<br>
                        Méret: ${ad.width}x${ad.height} | Aktív: ${ad.active ? 'Igen' : 'Nem'}
                        <button onclick="editAdSimple(${ad.id})">Szerkeszt</button>
                        <button onclick="toggleAdActive(${ad.id})">Aktív/Ki</button>
                    </div>
                `).join('')}
                <div id="adEditContainer"></div>
            </div>
        `;
    }

    // Admin függvények (bővítve SEO-val)
    window.adminLogin = function() {
        let pass = document.getElementById('adminPass').value;
        if(pass === 'admin123') {
            let adminUser = users.find(u => u.username === 'admin');
            if(adminUser) currentUser = adminUser;
            else { currentUser = {id:999, username:'admin', email:'admin@a.hu'}; users.push(currentUser); saveData();}
            renderApp();
        } else alert('Rossz jelszó');
    };
    window.showAddMovieForm = () => {
        let catOptions = categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
        let form = `<div><h3>Új film - SEO adatokkal</h3>
            <input id="newTitle" placeholder="Cím*"><input id="newYear" placeholder="Év*">
            <textarea id="newDesc" placeholder="Leírás* (ez lesz a meta leírás alapja)"></textarea>
            <input id="newVideo" placeholder="Videó URL (embed)">
            <input id="newPoster" placeholder="Poszter URL">
            <select id="newCategory">${catOptions}</select>
            <hr><strong>SEO beállítások:</strong>
            <input id="newMetaTitle" placeholder="Meta cím (ha üres, a cím lesz)">
            <textarea id="newMetaDesc" placeholder="Meta leírás (max 160 karakter)"></textarea>
            <input id="newSlug" placeholder="SEO slug (pl. inception-2010)">
            <input id="newAlt" placeholder="Alt szöveg a képhez">
            <button onclick="addNewMovie()">Hozzáadás</button></div>`;
        document.getElementById('movieFormContainer').innerHTML = form;
    };
    window.addNewMovie = () => {
        let newId = Date.now();
        let title = document.getElementById('newTitle').value;
        if(!title) { alert("Cím kötelező!"); return; }
        movies.push({
            id: newId,
            title: title,
            year: parseInt(document.getElementById('newYear').value) || 0,
            description: document.getElementById('newDesc').value,
            videoUrl: document.getElementById('newVideo').value,
            posterUrl: document.getElementById('newPoster').value,
            categoryId: parseInt(document.getElementById('newCategory').value),
            createdAt: Date.now(),
            metaTitle: document.getElementById('newMetaTitle').value || title,
            metaDescription: document.getElementById('newMetaDesc').value || document.getElementById('newDesc').value.substring(0,160),
            slug: document.getElementById('newSlug').value || title.toLowerCase().replace(/[^a-z0-9]+/g, '-'),
            altText: document.getElementById('newAlt').value || `${title} filmplakát`
        });
        saveData();
        renderApp();
    };
    window.editMovie = (id) => {
        let m = movies.find(x=>x.id===id);
        let catOptions = categories.map(c => `<option value="${c.id}" ${c.id===m.categoryId ? 'selected' : ''}>${c.name}</option>`).join('');
        let form = `<div><h3>Film szerkesztése + SEO</h3>
            <input id="editTitle" value="${m.title}"><input id="editYear" value="${m.year}">
            <textarea id="editDesc">${m.description}</textarea>
            <input id="editVideo" value="${m.videoUrl}"><input id="editPoster" value="${m.posterUrl}">
            <select id="editCategory">${catOptions}</select>
            <hr><strong>SEO mezők:</strong>
            <input id="editMetaTitle" value="${m.metaTitle || ''}">
            <textarea id="editMetaDesc">${m.metaDescription || ''}</textarea>
            <input id="editSlug" value="${m.slug || ''}">
            <input id="editAlt" value="${m.altText || ''}">
            <button onclick="saveMovieEdit(${id})">Mentés</button></div>`;
        document.getElementById('movieFormContainer').innerHTML = form;
    };
    window.saveMovieEdit = (id) => {
        let m = movies.find(x=>x.id===id);
        m.title = document.getElementById('editTitle').value;
        m.year = parseInt(document.getElementById('editYear').value);
        m.description = document.getElementById('editDesc').value;
        m.videoUrl = document.getElementById('editVideo').value;
        m.posterUrl = document.getElementById('editPoster').value;
        m.categoryId = parseInt(document.getElementById('editCategory').value);
        m.metaTitle = document.getElementById('editMetaTitle').value;
        m.metaDescription = document.getElementById('editMetaDesc').value;
        m.slug = document.getElementById('editSlug').value;
        m.altText = document.getElementById('editAlt').value;
        saveData();
        renderApp();
    };
    window.deleteMovie = (id) => { if(confirm('Törlöd?')) { movies = movies.filter(m=>m.id!==id); saveData(); renderApp();} };
    window.addCategory = () => {
        let name = document.getElementById('newCatName').value.trim();
        if(name) { categories.push({id: Date.now(), name}); saveData(); renderApp(); }
    };
    window.deleteCategory = (id) => {
        if(confirm('Kategória törlése? A filmekből eltűnik!')) {
            categories = categories.filter(c=>c.id!==id);
            movies.forEach(m => { if(m.categoryId === id) m.categoryId = null; });
            saveData();
            renderApp();
        }
    };
    window.editAdSimple = (id) => {
        let a = ads.find(x=>x.id===id);
        let form = `<div><input id="adCode${id}" value="${a.code.replace(/"/g, '&quot;')}"><button onclick="saveAdCode(${id})">Mentés</button></div>`;
        document.getElementById('adEditContainer').innerHTML = form;
    };
    window.saveAdCode = (id) => {
        let a = ads.find(x=>x.id===id);
        a.code = document.getElementById(`adCode${id}`).value;
        saveData();
        renderApp();
    };
    window.toggleAdActive = (id) => {
        let a = ads.find(x=>x.id===id);
        a.active = !a.active;
        saveData();
        renderApp();
    };
    window.handleLike = (movieId) => { toggleLike(movieId); renderApp(); };
    window.submitComment = (movieId) => {
        let text = document.getElementById('newCommentText').value;
        if(addComment(movieId, text)) { document.getElementById('newCommentText').value = ''; renderApp(); }
        else alert('Hiba vagy üres komment');
    };
    window.setCategoryFilter = (catId) => {
        activeCategoryId = catId;
        renderApp();
    };

    // Navigáció hash alapján
    function navigateTo(view, id = null) {
        if(view === 'home') location.hash = '#home';
        else if(view === 'movie' && id) location.hash = `#movie/${id}`;
        else if(view === 'admin') location.hash = '#admin';
        else if(view === 'login') location.hash = '#login';
        else location.hash = '#home';
    }

    function handleHash() {
        const hash = location.hash.slice(1);
        if(hash === 'home' || hash === '') {
            currentView = 'home';
            selectedMovieId = null;
            resetMetaToDefault();
            renderApp();
            setTimeout(() => { startCarousel(); currentCarouselIndex = 0; renderCarousel(); }, 100);
        } else if(hash.startsWith('movie/')) {
            let id = parseInt(hash.split('/')[1]);
            if(!isNaN(id)) { currentView = 'movie'; selectedMovieId = id; renderApp(); }
            else navigateTo('home');
        } else if(hash === 'admin') {
            currentView = 'admin';
            resetMetaToDefault();
            renderApp();
        } else if(hash === 'login') {
            currentView = 'login';
            resetMetaToDefault();
            renderApp();
        } else {
            navigateTo('home');
        }
        updateUserPanel();
    }

    function renderApp() {
        const root = document.getElementById('appRoot');
        if(currentView === 'home') {
            root.innerHTML = renderHome();
            setTimeout(() => { startCarousel(); currentCarouselIndex = 0; renderCarousel(); }, 50);
        } else if(currentView === 'movie' && selectedMovieId) {
            if(carouselInterval) clearInterval(carouselInterval);
            root.innerHTML = renderFilmPage(selectedMovieId);
        } else if(currentView === 'admin') {
            if(carouselInterval) clearInterval(carouselInterval);
            root.innerHTML = renderAdmin();
        } else if(currentView === 'login') {
            if(carouselInterval) clearInterval(carouselInterval);
            root.innerHTML = renderLoginRegister();
        } else {
            navigateTo('home');
        }
    }

    function renderLoginRegister() {
        return `
            <div class="admin-section" style="max-width:400px; margin:0 auto;">
                <h2>Bejelentkezés</h2>
                <input id="loginUser" placeholder="Felhasználónév"><input id="loginPass" type="password" placeholder="Jelszó">
                <button onclick="doLogin()">Belépés</button>
                <hr><h3>Regisztráció</h3>
                <input id="regUser" placeholder="Név"><input id="regEmail" placeholder="Email"><input id="regPass" type="password" placeholder="Jelszó">
                <button onclick="doRegister()">Regisztrálok</button>
                <p><a onclick="navigateTo('home')">Vissza a főoldalra</a></p>
            </div>
        `;
    }
    window.doLogin = () => {
        let uname = document.getElementById('loginUser').value;
        let pwd = document.getElementById('loginPass').value;
        let user = users.find(u => u.username === uname && u.password === pwd);
        if(user) { currentUser = user; saveData(); navigateTo('home'); }
        else alert('Hibás adatok');
    };
    window.doRegister = () => {
        let uname = document.getElementById('regUser').value;
        let email = document.getElementById('regEmail').value;
        let pwd = document.getElementById('regPass').value;
        if(users.find(u=>u.username===uname)) { alert('Létezik a név'); return; }
        let newUser = {id: Date.now(), username: uname, email, password: pwd};
        users.push(newUser); saveData(); currentUser = newUser; navigateTo('home');
    };
    window.logout = () => { currentUser = null; navigateTo('home'); };
    function updateUserPanel() {
        const panel = document.getElementById('userPanel');
        if(currentUser) panel.innerHTML = `<span>👤 ${currentUser.username}</span> <button onclick="logout()">Kilépés</button>`;
        else panel.innerHTML = `<button onclick="navigateTo('login')">Belépés / Reg</button>`;
    }

    window.navigateTo = navigateTo;
    window.moveCarousel = moveCarousel;

    loadData();
    window.addEventListener('hashchange', handleHash);
    handleHash();
</script>
</body>
</html>
