<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FilmStream Pro - Admin + Like + Komment</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            background: #0a0a0a;
            color: #eee;
        }
        /* NAVBAR */
        .navbar {
            background: #111;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            border-bottom: 1px solid #2c2c2c;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            font-size: 1.6rem;
            font-weight: bold;
            background: linear-gradient(135deg, #E50914, #ff4d4d);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .nav-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }
        .nav-links a {
            color: #ddd;
            text-decoration: none;
            transition: 0.2s;
            cursor: pointer;
        }
        .nav-links a:hover, .nav-links a.active {
            color: #E50914;
        }
        .user-panel {
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        button, .btn {
            background: #2c2c2c;
            border: none;
            color: white;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-red {
            background: #E50914;
        }
        .btn-red:hover {
            background: #b0060f;
        }
        input, textarea, select {
            background: #1e1e1e;
            border: 1px solid #3a3a3a;
            padding: 0.5rem;
            border-radius: 8px;
            color: white;
            width: 100%;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }
        /* film grid */
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.8rem;
            margin-top: 1.5rem;
        }
        .movie-card {
            background: #151515;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s;
            cursor: pointer;
        }
        .movie-card:hover {
            transform: scale(1.03);
        }
        .movie-poster {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            background: #222;
        }
        .movie-info {
            padding: 0.8rem;
        }
        .movie-title {
            font-weight: 600;
        }
        .ad-space {
            margin: 1rem 0;
            background: #1a1a1a;
            border: 1px dashed #E50914;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .ad-placeholder {
            text-align: center;
            color: #aaa;
            font-size: 0.8rem;
            padding: 0.5rem;
        }
        .film-page {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
        }
        .film-main {
            flex: 2;
            min-width: 250px;
        }
        .film-sidebar {
            flex: 1;
            min-width: 250px;
        }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            background: black;
            margin-bottom: 1rem;
        }
        .video-wrapper iframe, .video-wrapper video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .comment {
            background: #1a1a1a;
            padding: 0.8rem;
            border-radius: 10px;
            margin-top: 0.8rem;
        }
        .comment-user {
            font-weight: bold;
            color: #E50914;
        }
        .admin-section {
            background: #111;
            padding: 1.5rem;
            border-radius: 20px;
            margin-top: 1rem;
        }
        .reklam-item {
            background: #222;
            padding: 1rem;
            margin: 1rem 0;
            border-radius: 12px;
        }
        hr {
            border-color: #333;
            margin: 1rem 0;
        }
        .like-btn {
            font-size: 1.3rem;
            background: none;
            border: 1px solid #E50914;
            margin-right: 0.5rem;
        }
        .like-btn.liked {
            background: #E50914;
        }
        @media (max-width: 700px) {
            .navbar {
                flex-direction: column;
            }
            .film-page {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="logo">🎬 FilmStream PRO</div>
    <div class="nav-links">
        <a onclick="navigateTo('home')">🏠 Főoldal</a>
        <a onclick="navigateTo('admin')" id="adminLink">🔧 Admin (védett)</a>
    </div>
    <div class="user-panel" id="userPanel">
        <!-- dinamikus login/reg -->
    </div>
</div>

<div id="appRoot" class="container">
    <!-- ide töltődnek az oldalak -->
</div>

<script>
    // ----------------------------- ADAT MODELLEK (localStorage) -----------------------------
    let movies = [];        // {id, title, year, description, seoKeywords, videoUrl, posterUrl}
    let ads = [];           // {id, name, position, width, height, code, active}
    let users = [];         // {id, username, email, password}
    let comments = [];      // {id, movieId, userId, username, text, date}
    let likes = [];         // {userId, movieId}

    let currentUser = null;
    let currentView = 'home';
    let selectedMovieId = null;

    // Helper: mentés localStorage-ba
    function saveData() {
        localStorage.setItem('filmstream_movies', JSON.stringify(movies));
        localStorage.setItem('filmstream_ads', JSON.stringify(ads));
        localStorage.setItem('filmstream_users', JSON.stringify(users));
        localStorage.setItem('filmstream_comments', JSON.stringify(comments));
        localStorage.setItem('filmstream_likes', JSON.stringify(likes));
    }

    function loadData() {
        movies = JSON.parse(localStorage.getItem('filmstream_movies')) || [];
        ads = JSON.parse(localStorage.getItem('filmstream_ads')) || [];
        users = JSON.parse(localStorage.getItem('filmstream_users')) || [];
        comments = JSON.parse(localStorage.getItem('filmstream_comments')) || [];
        likes = JSON.parse(localStorage.getItem('filmstream_likes')) || [];

        if(movies.length === 0) {
            // Alap filmek
            movies.push({id: 1, title: "Eredet (Inception)", year: 2010, description: "Egy tolvaj, aki álmokból lop.", seoKeywords: "thriller, sci-fi", videoUrl: "https://www.youtube.com/embed/YoHD9XEInc0", posterUrl: "https://image.tmdb.org/t/p/w500/9gk7adHYeDvHkCSEqAvQNLV5Uge.jpg"});
            movies.push({id: 2, title: "A Sötét Lovag", year: 2008, description: "Batman Joker ellen.", seoKeywords: "akció, krimi", videoUrl: "https://www.youtube.com/embed/EXeTwQWrcwY", posterUrl: "https://image.tmdb.org/t/p/w500/qJ2tW6WMUDux911r6m7haRef0WH.jpg"});
            movies.push({id: 3, title: "Ponyvaregény", year: 1994, description: "Tarantino klasszikus.", seoKeywords: "kultusz", videoUrl: "https://www.youtube.com/embed/s7EdQ4FqbhY", posterUrl: "https://image.tmdb.org/t/p/w500/d5iIlFn5s0ImszYzBPb8JPIfbXD.jpg"});
        }
        if(ads.length === 0) {
            // előre definiált reklámblokkok
            ads.push({id: 1, name: "Főoldal teteje", position: "home_top", width: "728", height: "90", code: "<img src='https://placehold.co/728x90/ff0000/white?text=REKLAM+1' style='width:100%;height:auto;max-width:728px'>", active: true});
            ads.push({id: 2, name: "Film oldal - bal oldalsáv", position: "film_sidebar", width: "300", height: "250", code: "<img src='https://placehold.co/300x250/00aaff/white?text=300x250+Hirdetés' style='width:100%'>", active: true});
            ads.push({id: 3, name: "Film oldal - kommentek alatt", position: "film_below_comments", width: "468", height: "60", code: "<img src='https://placehold.co/468x60/green/white?text=468x60+Banner' style='width:100%'>", active: true});
        }
        if(users.length === 0) {
            users.push({id: 1, username: "admin", email: "admin@film.hu", password: "admin123"});
            users.push({id: 2, username: "teszt", email: "teszt@mail.com", password: "123456"});
        }
        saveData();
    }

    // Reklám megjelenítő helper
    function renderAdByPosition(position) {
        let ad = ads.find(a => a.position === position && a.active);
        if(!ad) return '<div class="ad-placeholder">📢 Reklám hely (nincs aktív blokk)</div>';
        return `<div class="ad-space" style="width:100%; max-width:${ad.width}px; margin:0 auto;"><div style="width:${ad.width}px; max-width:100%; margin:0 auto;">${ad.code}</div></div>`;
    }

    // Like kezelés
    function isMovieLikedByUser(movieId) {
        if(!currentUser) return false;
        return likes.some(l => l.userId === currentUser.id && l.movieId === movieId);
    }
    function toggleLike(movieId) {
        if(!currentUser) { alert("Jelentkezz be a like-hoz!"); return false; }
        const idx = likes.findIndex(l => l.userId === currentUser.id && l.movieId === movieId);
        if(idx === -1) {
            likes.push({userId: currentUser.id, movieId: movieId});
        } else {
            likes.splice(idx,1);
        }
        saveData();
        return true;
    }
    function getLikeCount(movieId) {
        return likes.filter(l => l.movieId === movieId).length;
    }

    // Kommentek
    function addComment(movieId, text) {
        if(!currentUser) { alert("Be kell jelentkezned kommenteléshez!"); return false; }
        if(!text.trim()) return false;
        comments.push({
            id: Date.now(),
            movieId: movieId,
            userId: currentUser.id,
            username: currentUser.username,
            text: text,
            date: new Date().toLocaleString()
        });
        saveData();
        return true;
    }
    function getCommentsForMovie(movieId) {
        return comments.filter(c => c.movieId === movieId).sort((a,b)=>b.id - a.id);
    }

    // ---------- UI RENDERELÉSEK ----------
    function renderHome() {
        let searchHtml = `<input type="text" id="searchFilm" placeholder="🔍 Film keresése..." style="margin-bottom:1rem;">`;
        let moviesHtml = `<div class="movies-grid" id="moviesGrid"></div>`;
        let topAd = renderAdByPosition('home_top');
        return `<div>${topAd}${searchHtml}${moviesHtml}</div>`;
    }

    function renderFilmPage(movieId) {
        const movie = movies.find(m => m.id == movieId);
        if(!movie) return "<h2>Film nem található</h2>";
        const liked = isMovieLikedByUser(movie.id);
        const likeCount = getLikeCount(movie.id);
        const commentsList = getCommentsForMovie(movie.id);
        const sidebarAd = renderAdByPosition('film_sidebar');
        const belowCommentsAd = renderAdByPosition('film_below_comments');

        let commentsHtml = commentsList.map(c => `<div class="comment"><span class="comment-user">${c.username}</span> <small>${c.date}</small><p>${c.text}</p></div>`).join('');
        if(commentsHtml === '') commentsHtml = '<p>Még nincs hozzászólás. Legyél te az első!</p>';

        return `
            <div class="film-page">
                <div class="film-main">
                    <div class="video-wrapper">
                        ${movie.videoUrl.includes('youtube') || movie.videoUrl.includes('embed') ? 
                            `<iframe src="${movie.videoUrl}" frameborder="0" allowfullscreen></iframe>` :
                            `<video controls src="${movie.videoUrl}" style="width:100%; height:100%; object-fit:cover;"></video>`}
                    </div>
                    <h1>${movie.title} (${movie.year})</h1>
                    <p><strong>Leírás:</strong> ${movie.description}</p>
                    <p><strong>SEO kulcsszavak:</strong> ${movie.seoKeywords || 'nincs'}</p>
                    <div style="display:flex; align-items:center; gap:1rem; margin:1rem 0;">
                        <button class="like-btn ${liked ? 'liked' : ''}" onclick="handleLike(${movie.id})"><i class="fas fa-thumbs-up"></i> ${likeCount}</button>
                    </div>
                    <hr>
                    <h3>💬 Hozzászólások (${commentsList.length})</h3>
                    <div id="commentList">${commentsHtml}</div>
                    ${currentUser ? `<textarea id="newCommentText" rows="2" placeholder="Írd ide a véleményed..." style="width:100%; margin:1rem 0;"></textarea>
                                    <button onclick="submitComment(${movie.id})">Komment küldése</button>` : 
                                    `<p><i class="fas fa-lock"></i> <a onclick="navigateTo('login')">Jelentkezz be</a> a kommenteléshez.</p>`}
                </div>
                <div class="film-sidebar">
                    ${sidebarAd}
                    <div class="admin-section" style="background:#1e1e1e; margin-top:1rem;">
                        <small>📢 További tartalom</small>
                        <p style="font-size:0.8rem;">Itt lehetnek más reklámok vagy infók.</p>
                    </div>
                </div>
            </div>
            <div style="margin-top:2rem;">${belowCommentsAd}</div>
        `;
    }

    // ADMIN FELÜLET - Reklám és film szerkesztés
    function renderAdmin() {
        if(!currentUser || currentUser.username !== 'admin') {
            // Jelszavas belépés
            return `<div class="admin-section"><h2>Admin belépés</h2><input type="password" id="adminPass" placeholder="Admin jelszó"><br><button onclick="adminLogin()">Belépés</button><p style="margin-top:1rem;">Alap jelszó: admin123</p></div>`;
        }
        // filmek admin
        let moviesAdminHtml = movies.map(m => `
            <div class="reklam-item">
                <strong>${m.title}</strong> (${m.year})
                <button onclick="editMovie(${m.id})">✏️ Szerkeszt</button>
                <button onclick="deleteMovie(${m.id})">🗑️ Töröl</button>
            </div>
        `).join('');
        // reklámok szerkesztése
        let adsAdminHtml = ads.map(ad => `
            <div class="reklam-item">
                <b>${ad.name}</b> (pozíció: ${ad.position})<br>
                Méret: ${ad.width}x${ad.height} | Aktív: ${ad.active ? 'Igen' : 'Nem'}
                <button onclick="editAd(${ad.id})">✏️ Szerkeszt</button>
                <button onclick="toggleAdActive(${ad.id})">🔁 Aktív/Kikapcs</button>
            </div>
        `).join('');

        return `
            <h1>🔧 Admin Panel</h1>
            <div class="admin-section">
                <h2>🎬 Filmek kezelése</h2>
                <button onclick="showAddMovieForm()">+ Új film hozzáadása</button>
                <div id="movieFormContainer"></div>
                <div id="moviesList">${moviesAdminHtml}</div>
            </div>
            <div class="admin-section">
                <h2>📢 Reklámblokkok kezelése</h2>
                <button onclick="showAddAdForm()">+ Új reklámblokk</button>
                <div id="adFormContainer"></div>
                <div>${adsAdminHtml}</div>
                <p><small>Pozíciók: home_top , film_sidebar , film_below_comments (vagy tetszőleges)</small></p>
            </div>
        `;
    }

    // globális admin függvények
    window.adminLogin = function() {
        let pass = document.getElementById('adminPass').value;
        if(pass === 'admin123') {
            let adminUser = users.find(u => u.username === 'admin');
            if(adminUser) currentUser = adminUser;
            else { currentUser = {id:999, username:'admin', email:'admin@a.hu'}; users.push(currentUser); saveData();}
            renderApp();
        } else alert('Rossz jelszó');
    };
    window.editMovie = (id) => { /* egyszerű inline form */
        let m = movies.find(x=>x.id===id);
        let formHtml = `<div><h3>Film szerkesztése</h3><label>Cím</label><input id="editTitle" value="${m.title}"><label>Év</label><input id="editYear" value="${m.year}"><label>Leírás</label><textarea id="editDesc">${m.description}</textarea><label>Videó URL (embed/YouTube)</label><input id="editVideo" value="${m.videoUrl}"><label>Poszter URL</label><input id="editPoster" value="${m.posterUrl}"><label>SEO kulcsszavak</label><input id="editSeo" value="${m.seoKeywords || ''}"><button onclick="saveMovieEdit(${id})">Mentés</button></div>`;
        document.getElementById('movieFormContainer').innerHTML = formHtml;
    };
    window.saveMovieEdit = (id) => {
        let m = movies.find(x=>x.id===id);
        m.title = document.getElementById('editTitle').value;
        m.year = parseInt(document.getElementById('editYear').value);
        m.description = document.getElementById('editDesc').value;
        m.videoUrl = document.getElementById('editVideo').value;
        m.posterUrl = document.getElementById('editPoster').value;
        m.seoKeywords = document.getElementById('editSeo').value;
        saveData();
        renderApp();
    };
    window.deleteMovie = (id) => { if(confirm('Törlöd?')) { movies = movies.filter(m=>m.id!==id); saveData(); renderApp();} };
    window.showAddMovieForm = () => {
        let form = `<div><h3>Új film</h3><input id="newTitle" placeholder="Cím"><input id="newYear" placeholder="Év"><textarea id="newDesc" placeholder="Leírás"></textarea><input id="newVideo" placeholder="Videó URL"><input id="newPoster" placeholder="Poszter URL"><input id="newSeo" placeholder="SEO szavak"><button onclick="addNewMovie()">Hozzáadás</button></div>`;
        document.getElementById('movieFormContainer').innerHTML = form;
    };
    window.addNewMovie = () => {
        let newId = Date.now();
        movies.push({id:newId, title:document.getElementById('newTitle').value, year:parseInt(document.getElementById('newYear').value), description:document.getElementById('newDesc').value, videoUrl:document.getElementById('newVideo').value, posterUrl:document.getElementById('newPoster').value, seoKeywords:document.getElementById('newSeo').value});
        saveData();
        renderApp();
    };
    // Reklám kezelés
    window.editAd = (id) => {
        let a = ads.find(x=>x.id===id);
        let form = `<div><input id="adName${id}" value="${a.name}"><input id="adWidth${id}" value="${a.width}"><input id="adHeight${id}" value="${a.height}"><textarea id="adCode${id}">${a.code}</textarea><button onclick="saveAd(${id})">Mentés</button></div>`;
        document.getElementById('adFormContainer').innerHTML = form;
    };
    window.saveAd = (id) => {
        let a = ads.find(x=>x.id===id);
        a.name = document.getElementById(`adName${id}`).value;
        a.width = document.getElementById(`adWidth${id}`).value;
        a.height = document.getElementById(`adHeight${id}`).value;
        a.code = document.getElementById(`adCode${id}`).value;
        saveData();
        renderApp();
    };
    window.toggleAdActive = (id) => {
        let a = ads.find(x=>x.id===id);
        a.active = !a.active;
        saveData();
        renderApp();
    };
    window.showAddAdForm = () => {
        let form = `<div><input id="newAdName" placeholder="Név"><input id="newAdPos" placeholder="Pozíció (home_top/film_sidebar/film_below_comments)"><input id="newAdW" placeholder="Szélesség"><input id="newAdH" placeholder="Magasság"><textarea id="newAdCode" placeholder="HTML kód"></textarea><button onclick="addNewAd()">Létrehoz</button></div>`;
        document.getElementById('adFormContainer').innerHTML = form;
    };
    window.addNewAd = () => {
        ads.push({id:Date.now(), name:document.getElementById('newAdName').value, position:document.getElementById('newAdPos').value, width:document.getElementById('newAdW').value, height:document.getElementById('newAdH').value, code:document.getElementById('newAdCode').value, active:true});
        saveData();
        renderApp();
    };

    // Like + komment globális
    window.handleLike = (movieId) => { toggleLike(movieId); renderApp(); };
    window.submitComment = (movieId) => {
        let text = document.getElementById('newCommentText').value;
        if(addComment(movieId, text)) { document.getElementById('newCommentText').value = ''; renderApp(); }
        else alert('Hiba vagy üres komment');
    };

    // Navigáció és dinamikus keresés
    function navigateTo(view, movieId = null) {
        currentView = view;
        selectedMovieId = movieId;
        renderApp();
    }
    function renderApp() {
        const root = document.getElementById('appRoot');
        if(currentView === 'home') {
            root.innerHTML = renderHome();
            updateMovieGrid();
            document.getElementById('searchFilm')?.addEventListener('input', (e) => updateMovieGrid(e.target.value));
        } else if(currentView === 'movie' && selectedMovieId) {
            root.innerHTML = renderFilmPage(selectedMovieId);
        } else if(currentView === 'admin') {
            root.innerHTML = renderAdmin();
        } else if(currentView === 'login') {
            root.innerHTML = renderLoginRegister();
        } else {
            root.innerHTML = "<h2>Oldal nem található</h2>";
        }
        updateUserPanel();
        if(currentView === 'admin' && currentUser?.username !== 'admin') {
            // marad a belépési mező
        }
    }
    function updateMovieGrid(search = '') {
        const grid = document.getElementById('moviesGrid');
        if(!grid) return;
        let filtered = movies.filter(m => m.title.toLowerCase().includes(search.toLowerCase()));
        if(filtered.length === 0) { grid.innerHTML = '<div>Nincs találat</div>'; return; }
        grid.innerHTML = filtered.map(m => `
            <div class="movie-card" onclick="navigateTo('movie', ${m.id})">
                <img class="movie-poster" src="${m.posterUrl}" onerror="this.src='https://placehold.co/300x450/333/white?text=No+Poster'">
                <div class="movie-info">
                    <div class="movie-title">${m.title} (${m.year})</div>
                </div>
            </div>
        `).join('');
    }
    function renderLoginRegister() {
        return `
            <div class="admin-section" style="max-width:400px; margin:0 auto;">
                <h2>🔐 Bejelentkezés / Regisztráció</h2>
                <input type="text" id="loginUser" placeholder="Felhasználónév"><br>
                <input type="password" id="loginPass" placeholder="Jelszó"><br>
                <button onclick="doLogin()">Belépés</button>
                <hr>
                <h3>Regisztráció</h3>
                <input type="text" id="regUser" placeholder="Név"><br>
                <input type="email" id="regEmail" placeholder="Email"><br>
                <input type="password" id="regPass" placeholder="Jelszó"><br>
                <button onclick="doRegister()">Regisztrálok</button>
                <p><a onclick="navigateTo('home')">Vissza a főoldalra</a></p>
            </div>
        `;
    }
    window.doLogin = () => {
        let uname = document.getElementById('loginUser').value;
        let pwd = document.getElementById('loginPass').value;
        let user = users.find(u => u.username === uname && u.password === pwd);
        if(user) { currentUser = user; saveData(); navigateTo('home'); }
        else alert('Hibás adatok');
    };
    window.doRegister = () => {
        let uname = document.getElementById('regUser').value;
        let email = document.getElementById('regEmail').value;
        let pwd = document.getElementById('regPass').value;
        if(users.find(u=>u.username===uname)) { alert('Létezik a név'); return; }
        let newUser = {id: Date.now(), username: uname, email: email, password: pwd};
        users.push(newUser);
        saveData();
        currentUser = newUser;
        navigateTo('home');
    };
    window.logout = () => { currentUser = null; navigateTo('home'); };
    function updateUserPanel() {
        const panel = document.getElementById('userPanel');
        if(currentUser) {
            panel.innerHTML = `<span>👤 ${currentUser.username}</span> <button onclick="logout()">Kilépés</button>`;
        } else {
            panel.innerHTML = `<button onclick="navigateTo('login')">Belépés / Reg</button>`;
        }
    }

    // Globális navigáció
    window.navigateTo = navigateTo;

    loadData();
    renderApp();
</script>
</body>
</html>
