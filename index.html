<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>FilmStream - filmek.json</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui; }
        body { background: #0a0a0a; color: #eee; padding: 1rem; }
        .navbar { display: flex; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; gap: 0.5rem; }
        button { background: #E50914; border: none; color: white; padding: 0.5rem 1rem; border-radius: 30px; cursor: pointer; }
        .movies-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); gap: 1rem; }
        .movie-card { background: #1a1a1a; border-radius: 12px; cursor: pointer; overflow: hidden; }
        .movie-poster { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .movie-info { padding: 0.5rem; text-align: center; }
        .film-page { display: flex; gap: 2rem; flex-wrap: wrap; }
        .video-wrapper iframe { width: 100%; aspect-ratio: 16/9; }
        .admin-section { background: #111; padding: 1rem; margin-top: 1rem; border-radius: 12px; }
        input, textarea { width: 100%; margin: 0.5rem 0; padding: 0.5rem; background: #222; color: white; border: none; border-radius: 8px; }
        .back-button { margin-bottom: 1rem; display: inline-block; }
        @media (max-width:700px){ .movies-grid { grid-template-columns: repeat(auto-fill, minmax(120px,1fr)); } }
    </style>
</head>
<body>
<div class="navbar">
    <div style="font-size:1.5rem;">🎬 FilmStream</div>
    <div>
        <button onclick="location.hash='admin'">Admin</button>
        <button onclick="location.hash='home'">Főoldal</button>
    </div>
</div>
<div id="app"></div>

<script>
let movies = [];
let categories = ['Akció', 'Dráma', 'Sci-fi'];
let currentUser = null;

async function loadMovies() {
    try {
        const res = await fetch('filmek.json?v=' + Date.now());
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        movies = data.movies || [];
        categories = data.categories || categories;
        if (movies.length === 0) {
            // egy alap film, ha üres
            movies = [{
                id: 1,
                title: 'Eredet',
                year: 2010,
                description: 'Álomtolvajok különleges küldetése.',
                videoUrl: 'https://www.youtube.com/embed/YoHD9XEInc0',
                posterUrl: 'https://image.tmdb.org/t/p/w500/9gk7adHYeDvHkCSEqAvQNLV5Uge.jpg',
                metaTitle: 'Eredet (2010) - előzetes',
                metaDescription: 'Nézd meg az Eredet előzetesét. Christopher Nolan sci-fi thrillerje.',
                slug: 'eredet-2010',
                altText: 'Eredet filmplakát'
            }];
        }
    } catch(e) {
        console.error('Hiba a filmek.json betöltésekor:', e);
        movies = [];
    }
}

function saveMoviesToFile() {
    const data = { movies, categories };
    const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'filmek.json';
    a.click();
    alert('Letöltve! Töltsd fel a filmek.json fájlt a GitHubra (felülírva a régit).');
}

function renderHome() {
    if (!movies.length) {
        document.getElementById('app').innerHTML = '<p>Nincsenek filmek. Tölts fel egy filmek.json fájlt!</p>';
        return;
    }
    let html = `<div class="movies-grid">`;
    movies.forEach(m => {
        html += `<div class="movie-card" onclick="location.hash='movie/${m.id}'">
                    <img class="movie-poster" src="${m.posterUrl}" alt="${m.altText || m.title}" onerror="this.src='https://placehold.co/300x450/333/white?text=No+Poster'">
                    <div class="movie-info">${m.title} (${m.year})</div>
                </div>`;
    });
    html += `</div>`;
    document.getElementById('app').innerHTML = html;
}

function renderMovie(id) {
    const m = movies.find(x => x.id == id);
    if (!m) {
        renderHome();
        return;
    }
    // SEO meta frissítés
    document.title = m.metaTitle || m.title;
    let metaDesc = document.querySelector('meta[name="description"]');
    if (!metaDesc) {
        metaDesc = document.createElement('meta');
        metaDesc.name = 'description';
        document.head.appendChild(metaDesc);
    }
    metaDesc.content = m.metaDescription || m.description;
    
    let html = `<button class="back-button" onclick="location.hash='home'">← Vissza a főoldalra</button>
                <div class="film-page">
                    <div class="video-wrapper"><iframe src="${m.videoUrl}" frameborder="0" allowfullscreen></iframe></div>
                    <div>
                        <h1>${m.title} (${m.year})</h1>
                        <p>${m.description}</p>
                    </div>
                </div>`;
    document.getElementById('app').innerHTML = html;
}

function renderAdmin() {
    let html = `<div class="admin-section"><h2>Admin belépés</h2>
                <input type="password" id="adminPass" placeholder="Jelszó">
                <button onclick="adminLogin()">Belépés</button></div>`;
    document.getElementById('app').innerHTML = html;
}

function adminLogin() {
    let pwd = document.getElementById('adminPass').value;
    if (pwd !== 'admin123') {
        alert('Rossz jelszó');
        return;
    }
    let form = `<div class="admin-section">
        <h3>Filmek szerkesztése</h3>
        ${movies.map(m => `<div style="margin:0.5rem 0;"><b>${m.title}</b> <button onclick="editMovie(${m.id})">✏️ Szerkeszt</button></div>`).join('')}
        <button onclick="addMovie()">+ Új film</button>
        <br><br>
        <button onclick="saveMoviesToFile()">📥 Változtatások mentése (letöltés)</button>
        <p style="margin-top:1rem;">A letöltött filmek.json fájlt töltsd fel a GitHubra (felülírva a régit).</p>
    </div>`;
    document.getElementById('app').innerHTML = form;
}

window.editMovie = (id) => {
    let m = movies.find(x => x.id === id);
    let form = `<div class="admin-section">
        <h3>Film szerkesztése</h3>
        <input id="title" value="${m.title.replace(/"/g, '&quot;')}" placeholder="Cím">
        <input id="year" value="${m.year}" placeholder="Év">
        <textarea id="desc" placeholder="Leírás">${m.description}</textarea>
        <input id="video" value="${m.videoUrl}" placeholder="Videó URL (YouTube embed)">
        <input id="poster" value="${m.posterUrl}" placeholder="Poszter URL">
        <input id="metaTitle" value="${(m.metaTitle || '').replace(/"/g, '&quot;')}" placeholder="Meta cím (böngésző címsor)">
        <textarea id="metaDesc" placeholder="Meta leírás (150-160 karakter, a Google ezt mutatja)">${m.metaDescription || ''}</textarea>
        <input id="slug" value="${(m.slug || '').replace(/"/g, '&quot;')}" placeholder="Slug (url név)">
        <input id="alt" value="${(m.altText || '').replace(/"/g, '&quot;')}" placeholder="Alt szöveg (kép leírása)">
        <button onclick="updateMovie(${id})">Mentés</button>
        <button onclick="renderAdmin()">Mégse</button>
    </div>`;
    document.getElementById('app').innerHTML = form;
};

window.updateMovie = (id) => {
    let m = movies.find(x => x.id === id);
    m.title = document.getElementById('title').value;
    m.year = parseInt(document.getElementById('year').value);
    m.description = document.getElementById('desc').value;
    m.videoUrl = document.getElementById('video').value;
    m.posterUrl = document.getElementById('poster').value;
    m.metaTitle = document.getElementById('metaTitle').value;
    m.metaDescription = document.getElementById('metaDesc').value;
    m.slug = document.getElementById('slug').value;
    m.altText = document.getElementById('alt').value;
    renderAdmin();
};

window.addMovie = () => {
    let newId = Date.now();
    movies.push({
        id: newId,
        title: 'Új film',
        year: 2024,
        description: 'Ide írd a leírást',
        videoUrl: '',
        posterUrl: '',
        metaTitle: '',
        metaDescription: '',
        slug: '',
        altText: ''
    });
    renderAdmin();
};

window.addEventListener('hashchange', () => {
    let hash = location.hash.slice(1);
    if (hash === 'admin') renderAdmin();
    else if (hash.startsWith('movie/')) renderMovie(parseInt(hash.split('/')[1]));
    else renderHome();
});

loadMovies().then(() => {
    if (!location.hash || location.hash === '#') location.hash = 'home';
    else window.dispatchEvent(new Event('hashchange'));
});
</script>
</body>
</html>
