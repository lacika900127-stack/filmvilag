<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="metaTitle">FilmVilág – Magyar Film és Sorozat Katalógus</title>
<meta name="description" id="metaDesc" content="A legjobb filmek és sorozatok egy helyen. Nézz filmeket ingyen magyarul.">
<meta name="keywords" id="metaKeys" content="filmek, sorozatok, magyar, online film, ingyenes film">
<meta name="robots" id="metaRobots" content="index, follow">
<meta property="og:title" id="ogTitle" content="FilmVilág">
<meta property="og:description" id="ogDesc" content="A legjobb filmek és sorozatok egy helyen.">
<meta property="og:image" id="ogImage" content="">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--bg2:#111118;--bg3:#1a1a24;
  --red:#e63946;--gold:#ffd60a;
  --text:#e8e8f0;--muted:#7a7a9a;
  --border:rgba(255,255,255,0.08);
  --accent:#e63946;
}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}

/* HEADER */
header{position:sticky;top:0;z-index:50;background:rgba(10,10,15,0.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 1rem;display:flex;align-items:center;justify-content:space-between;height:58px;gap:0.8rem}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:2px;white-space:nowrap;cursor:pointer}
.logo span{color:var(--accent)}
.header-right{display:flex;align-items:center;gap:0.6rem;flex:1;justify-content:flex-end}
.search-wrap{display:flex;align-items:center;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:0 0.8rem;gap:0.4rem;flex:1;max-width:220px}
.search-wrap input{background:none;border:none;outline:none;color:var(--text);font-family:'Nunito',sans-serif;font-size:0.85rem;width:100%;padding:0.45rem 0}
.search-wrap input::placeholder{color:var(--muted)}
.admin-btn{background:var(--bg3);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:0.4rem 0.8rem;font-size:0.8rem;cursor:pointer;font-family:'Nunito',sans-serif;white-space:nowrap;transition:all 0.2s}
.admin-btn:hover{color:var(--text)}

/* SLIDER */
.slider-section{padding:1rem;border-bottom:1px solid var(--border);background:var(--bg2)}
.slider-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.8rem}
.slider-title{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:1px;display:flex;align-items:center;gap:0.5rem}
.slider-title span{color:var(--accent)}
.slider-nav{display:flex;gap:0.4rem}
.slider-nav button{background:var(--bg3);border:1px solid var(--border);color:var(--text);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:1rem;transition:all 0.2s;display:flex;align-items:center;justify-content:center}
.slider-nav button:hover{background:var(--accent);border-color:var(--accent)}
.slider-outer{overflow:hidden;position:relative}
.slider-track{display:flex;gap:0.7rem;transition:transform 0.4s cubic-bezier(.4,0,.2,1)}
.slider-card{flex:0 0 calc(25% - 0.53rem);min-width:0;cursor:pointer;border-radius:10px;overflow:hidden;background:var(--bg);border:1px solid var(--border);transition:transform 0.2s,box-shadow 0.2s,border-color 0.2s;position:relative}
@media(max-width:600px){.slider-card{flex:0 0 calc(50% - 0.35rem)}}
.slider-card:hover{transform:translateY(-4px);box-shadow:0 14px 32px rgba(0,0,0,0.5);border-color:rgba(230,57,70,0.4)}
.slider-poster{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:#1a1a24}
.slider-poster-placeholder{width:100%;aspect-ratio:2/3;display:flex;align-items:center;justify-content:center;font-size:3rem;background:#1a1a24}
.slider-info{padding:0.5rem 0.6rem}
.slider-name{font-weight:700;font-size:0.8rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.slider-meta{font-size:0.68rem;color:var(--muted)}
.slider-qual{position:absolute;top:6px;left:6px;background:var(--accent);color:#fff;font-size:0.58rem;font-weight:800;letter-spacing:1px;padding:0.15rem 0.4rem;border-radius:3px}
.slider-star{position:absolute;top:6px;right:6px;background:rgba(0,0,0,0.75);color:var(--gold);font-size:0.68rem;font-weight:800;padding:0.15rem 0.4rem;border-radius:3px}

/* AD BANNERS */
.ad-slot{display:none;width:100%;text-align:center;padding:0.5rem;background:var(--bg2);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.ad-slot.active{display:block}
.ad-slot-inline{display:none;grid-column:1/-1;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:1rem;text-align:center;min-height:80px;align-items:center;justify-content:center}
.ad-slot-inline.active{display:flex}

/* CATS */
.cats{display:flex;gap:0.5rem;overflow-x:auto;padding:0.9rem 1rem;border-bottom:1px solid var(--border);scrollbar-width:none}
.cats::-webkit-scrollbar{display:none}
.cat{padding:0.35rem 1rem;border-radius:20px;font-size:0.78rem;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--muted);white-space:nowrap;font-family:'Nunito',sans-serif;transition:all 0.2s}
.cat.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* MAIN */
main{padding:1.2rem 1rem;max-width:1400px;margin:0 auto}
.section{margin-bottom:2.5rem}
.sec-head{display:flex;align-items:center;gap:0.5rem;margin-bottom:1rem}
.sec-bar{width:4px;height:20px;background:var(--accent);border-radius:2px;flex-shrink:0}
.sec-title{font-weight:800;font-size:1rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:0.9rem}
@media(max-width:480px){.grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}}
.card{cursor:pointer;border-radius:10px;overflow:hidden;background:var(--bg2);border:1px solid var(--border);transition:transform 0.22s,box-shadow 0.22s,border-color 0.22s}
.card:hover{transform:translateY(-4px);box-shadow:0 14px 32px rgba(0,0,0,0.5);border-color:rgba(230,57,70,0.4)}
.card-poster{width:100%;aspect-ratio:2/3;display:flex;align-items:center;justify-content:center;font-size:3rem;position:relative;overflow:hidden;background:#1a1a24}
.card-poster img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.card-qual{position:absolute;top:6px;left:6px;z-index:2;background:var(--accent);color:#fff;font-size:0.58rem;font-weight:800;letter-spacing:1px;padding:0.15rem 0.4rem;border-radius:3px}
.card-star{position:absolute;top:6px;right:6px;z-index:2;background:rgba(0,0,0,0.75);color:var(--gold);font-size:0.68rem;font-weight:800;padding:0.15rem 0.4rem;border-radius:3px}
.card-info{padding:0.65rem}
.card-title{font-weight:700;font-size:0.82rem;margin-bottom:0.25rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-meta{display:flex;gap:0.35rem;align-items:center;font-size:0.68rem;color:var(--muted)}
.card-gtag{background:var(--bg3);padding:0.1rem 0.4rem;border-radius:3px;font-size:0.62rem}

/* PLAYER PAGE */
#playerPage{display:none;position:fixed;inset:0;background:var(--bg);z-index:300;flex-direction:column;overflow-y:auto}
#playerPage.open{display:flex}
.player-header{display:flex;align-items:center;gap:0.8rem;padding:0.8rem 1rem;background:rgba(10,10,15,0.97);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
.back-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:0.45rem 1rem;font-family:'Nunito',sans-serif;font-size:0.88rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:0.4rem;transition:all 0.2s}
.back-btn:hover{background:var(--accent);border-color:var(--accent)}
.player-title-bar{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:1px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.player-wrap{width:100%;background:#000}
.player-wrap iframe,.player-wrap video{width:100%;aspect-ratio:16/9;display:block;border:none}
.player-info{padding:1.2rem 1rem}
.player-film-title{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:1px;margin-bottom:0.5rem}
.player-tags{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:0.8rem}
.player-desc{color:var(--muted);line-height:1.7;font-size:0.9rem}
.ad-preroll{display:none;position:relative;width:100%;background:#000;aspect-ratio:16/9}
.ad-preroll.active{display:flex;align-items:center;justify-content:center}
.ad-preroll-inner{width:100%;height:100%;position:relative}
.ad-preroll-inner iframe{width:100%;height:100%;border:none}
.skip-btn{position:absolute;bottom:16px;right:16px;background:rgba(0,0,0,0.8);color:#fff;border:1px solid rgba(255,255,255,0.3);border-radius:6px;padding:0.5rem 1rem;font-family:'Nunito',sans-serif;font-size:0.85rem;font-weight:700;cursor:pointer;z-index:10;transition:all 0.2s}
.skip-btn:hover{background:var(--accent)}
.skip-countdown{color:var(--muted)}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(10px);padding:1rem}
.overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;max-width:640px;width:100%;max-height:90vh;overflow-y:auto}
.modal-top{position:relative;height:200px;border-radius:16px 16px 0 0;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#1a1a24}
.modal-top img{width:100%;height:100%;object-fit:cover;opacity:0.6;position:absolute;inset:0}
.modal-top-emoji{position:relative;z-index:1;font-size:5rem}
.modal-close{position:absolute;top:10px;right:10px;z-index:5;background:rgba(0,0,0,0.65);border:none;color:#fff;width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:background 0.2s}
.modal-close:hover{background:var(--accent)}
.modal-grad{position:absolute;bottom:0;left:0;right:0;z-index:2;padding:1rem 1.2rem;background:linear-gradient(to top,var(--bg2),transparent)}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:1px}
.modal-body{padding:1.2rem}
.modal-meta{display:flex;gap:0.5rem;flex-wrap:wrap;align-items:center;margin-bottom:1rem}
.modal-desc{color:var(--muted);line-height:1.7;font-size:0.9rem;margin-bottom:1.3rem}
.modal-btns{display:flex;gap:0.6rem;flex-wrap:wrap}
.tag{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:0.15rem 0.6rem;font-size:0.72rem;color:#aaa}
.rst{color:var(--gold);font-weight:800;font-size:0.95rem}
.btn{padding:0.55rem 1.3rem;border-radius:8px;font-family:'Nunito',sans-serif;font-size:0.88rem;font-weight:700;cursor:pointer;border:none;transition:all 0.2s;display:inline-flex;align-items:center;gap:0.4rem}
.btn-red{background:var(--accent);color:#fff}.btn-red:hover{filter:brightness(1.15);transform:translateY(-1px)}
.btn-ghost{background:rgba(255,255,255,0.08);color:var(--text);border:1px solid var(--border)}.btn-ghost:hover{background:rgba(255,255,255,0.14)}

/* PASSWORD */
#pwOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:500;align-items:center;justify-content:center;padding:1rem}
#pwOverlay.open{display:flex}
.pw-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:2rem;max-width:340px;width:100%;text-align:center}
.pw-box h2{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:1px;margin-bottom:0.3rem}
.pw-box p{color:var(--muted);font-size:0.85rem;margin-bottom:1.2rem}
.pw-input{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:0.7rem 1rem;color:var(--text);font-family:'Nunito',sans-serif;font-size:1rem;outline:none;width:100%;margin-bottom:0.8rem;text-align:center;letter-spacing:2px;transition:border-color 0.2s}
.pw-input:focus{border-color:var(--accent)}
.pw-err{color:var(--accent);font-size:0.82rem;margin-bottom:0.8rem;display:none}

/* ADMIN */
#adminOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.93);z-index:400;align-items:flex-start;justify-content:center;padding:1rem;overflow-y:auto}
#adminOverlay.open{display:flex}
.admin-panel{background:var(--bg2);border:1px solid var(--border);border-radius:16px;width:100%;max-width:760px;margin:auto}
.admin-header{display:flex;align-items:center;justify-content:space-between;padding:1.2rem 1.5rem;border-bottom:1px solid var(--border)}
.admin-header h2{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:1px}
.admin-body{padding:1.5rem}
.admin-tabs{display:flex;gap:0.4rem;margin-bottom:1.5rem;flex-wrap:wrap}
.admin-tab{padding:0.4rem 0.8rem;border-radius:8px;font-size:0.78rem;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--muted);font-family:'Nunito',sans-serif;transition:all 0.2s}
.admin-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.8rem}
@media(max-width:500px){.form-grid{grid-template-columns:1fr}}
.form-full{grid-column:1/-1}
.form-group{display:flex;flex-direction:column;gap:0.3rem}
.form-group label{font-size:0.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px}
.form-group input,.form-group select,.form-group textarea{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:0.6rem 0.8rem;color:var(--text);font-family:'Nunito',sans-serif;font-size:0.88rem;outline:none;transition:border-color 0.2s;width:100%}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent)}
.form-group select option{background:var(--bg3)}
.form-group textarea{resize:vertical;min-height:80px}
.form-actions{display:flex;gap:0.6rem;margin-top:1rem;flex-wrap:wrap}
.film-list{display:flex;flex-direction:column;gap:0.6rem;max-height:400px;overflow-y:auto}
.fli{display:flex;align-items:center;gap:0.8rem;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:0.7rem 1rem}
.fli-emoji{font-size:1.5rem;flex-shrink:0}
.fli-poster{width:36px;height:50px;object-fit:cover;border-radius:4px;flex-shrink:0}
.fli-info{flex:1;min-width:0}
.fli-title{font-weight:700;font-size:0.88rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fli-meta{font-size:0.72rem;color:var(--muted)}
.fli-del{background:rgba(230,57,70,0.15);border:1px solid rgba(230,57,70,0.3);color:var(--accent);border-radius:6px;padding:0.3rem 0.7rem;font-size:0.78rem;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;transition:all 0.2s;flex-shrink:0}
.fli-del:hover{background:var(--accent);color:#fff}
.alert{padding:0.7rem 1rem;border-radius:8px;font-size:0.85rem;font-weight:600;margin-bottom:0.8rem;display:none}
.alert.ok{background:rgba(46,213,115,0.15);border:1px solid rgba(46,213,115,0.3);color:#2ed573}
.alert.err{background:rgba(230,57,70,0.15);border:1px solid rgba(230,57,70,0.3);color:var(--accent)}
.alert.show{display:block}
.empty{text-align:center;padding:3rem 1rem;color:var(--muted)}
.empty-icon{font-size:3rem;margin-bottom:0.5rem}

/* AD MANAGER */
.ad-manager-grid{display:flex;flex-direction:column;gap:1rem}
.ad-block{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:1rem}
.ad-block-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.8rem}
.ad-block-title{font-weight:800;font-size:0.9rem;display:flex;align-items:center;gap:0.5rem}
.toggle{position:relative;width:44px;height:24px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:#333;border-radius:24px;cursor:pointer;transition:0.3s}
.toggle-slider:before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:0.3s}
.toggle input:checked + .toggle-slider{background:var(--accent)}
.toggle input:checked + .toggle-slider:before{transform:translateX(20px)}
.ad-positions{display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;margin-top:0.8rem}
@media(max-width:480px){.ad-positions{grid-template-columns:1fr}}
.ad-pos-item{display:flex;align-items:center;justify-content:space-between;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:0.5rem 0.8rem;font-size:0.82rem}

/* DESIGN EDITOR */
.design-grid{display:flex;flex-direction:column;gap:1rem}
.design-block{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:1rem}
.design-block-title{font-weight:800;font-size:0.9rem;margin-bottom:0.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;font-size:0.78rem}
.color-row{display:flex;gap:0.8rem;flex-wrap:wrap;align-items:center}
.color-item{display:flex;flex-direction:column;gap:0.3rem;align-items:center;font-size:0.72rem;color:var(--muted)}
.color-item input[type=color]{width:44px;height:44px;border:none;border-radius:8px;cursor:pointer;background:none;padding:0}
.cats-editor{display:flex;flex-direction:column;gap:0.5rem}
.cat-edit-item{display:flex;align-items:center;gap:0.5rem;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:0.5rem 0.8rem}
.cat-edit-item input{background:none;border:none;outline:none;color:var(--text);font-family:'Nunito',sans-serif;font-size:0.85rem;flex:1}
.cat-edit-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;transition:color 0.2s}
.cat-edit-del:hover{color:var(--accent)}
.add-cat-row{display:flex;gap:0.5rem;margin-top:0.5rem}
.add-cat-row input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:0.5rem 0.8rem;color:var(--text);font-family:'Nunito',sans-serif;font-size:0.85rem;outline:none}
.add-cat-row input:focus{border-color:var(--accent)}

/* SEO */
.seo-grid{display:flex;flex-direction:column;gap:0.8rem}

footer{border-top:1px solid var(--border);padding:1.5rem;text-align:center;color:var(--muted);font-size:0.78rem}
footer span{color:var(--accent)}
</style>
</head>
<body>

<header>
  <div class="logo" id="siteLogo" onclick="goHome()">Film<span>Világ</span></div>
  <div class="header-right">
    <div class="search-wrap">
      <span style="color:var(--muted)">🔍</span>
      <input type="text" id="searchInput" placeholder="Keresés..." oninput="doFilter()">
    </div>
    <button class="admin-btn" onclick="openAdminAuth()">⚙️ Admin</button>
  </div>
</header>

<!-- AD: Fejléc alatt banner -->
<div class="ad-slot" id="adBannerTop"></div>

<!-- SLIDER -->
<div class="slider-section" id="sliderSection" style="display:none">
  <div class="slider-head">
    <div class="slider-title">🎬 <span>Kiemelt</span> &nbsp;filmek</div>
    <div class="slider-nav">
      <button onclick="sliderPrev()">‹</button>
      <button onclick="sliderNext()">›</button>
    </div>
  </div>
  <div class="slider-outer">
    <div class="slider-track" id="sliderTrack"></div>
  </div>
</div>

<!-- CATS -->
<div class="cats" id="catsBar"></div>

<!-- AD: Kategóriák alatt -->
<div class="ad-slot" id="adBannerMid"></div>

<main>
  <div id="mainSections"></div>
  <div id="filteredSection" style="display:none">
    <div class="section">
      <div class="sec-head"><div class="sec-bar"></div><div class="sec-title" id="filtTitle">Találatok</div></div>
      <div class="grid" id="filtGrid"></div>
      <div class="empty" id="emptyMsg" style="display:none"><div class="empty-icon">🎬</div><p>Nem találtunk ilyen filmet.</p></div>
    </div>
  </div>
</main>

<!-- AD: Footer felett -->
<div class="ad-slot" id="adBannerBottom"></div>

<footer>© 2024 <span id="footerName">FilmVilág</span> – Minden jog fenntartva.</footer>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-top" id="mTop">
      <img id="mPosterImg" src="" style="dis
