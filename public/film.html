<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta id="metaDescription" name="description" content="Film leírása">
    <meta id="metaKeywords" name="keywords" content="">
    <meta id="metaRobots" name="robots" content="index, follow">
    
    <!-- Open Graph -->
    <meta id="ogTitle" property="og:title" content="">
    <meta id="ogDescription" property="og:description" content="">
    <meta id="ogImage" property="og:image" content="">
    <meta property="og:type" content="video.movie">
    <meta id="ogUrl" property="og:url" content="">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta id="twitterTitle" name="twitter:title" content="">
    <meta id="twitterDescription" name="twitter:description" content="">
    
    <!-- Canonical -->
    <link id="canonical" rel="canonical" href="">
    
    <!-- Schema.org -->
    <script id="schemaMarkup" type="application/ld+json"></script>

    <title id="pageTitle">FilmVilág</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #e94560;
            --secondary-color: #ff6b6b;
            --bg-color: #1a1a2e;
            --dark-bg: #16213e;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-color) 0%, var(--dark-bg) 100%);
            color: #fff;
            min-height: 100vh;
        }

        header {
            background: rgba(0, 0, 0, 0.95);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.5);
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .back-btn {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: #fff;
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.3s;
            box-shadow: 0 4px 12px rgba(233, 69, 96, 0.3);
        }

        .back-btn:hover {
            opacity: 0.9;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            cursor: pointer;
        }

        main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .film-header {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 3rem;
            margin-bottom: 3rem;
        }

        .film-poster-large {
            width: 100%;
            height: 450px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 6rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .film-details {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .film-details h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: var(--secondary-color);
        }

        .film-rating {
            font-size: 1.5rem;
            color: #ffd700;
            margin-bottom: 1rem;
        }

        .film-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
            padding: 1.5rem 0;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .meta-item {
            display: flex;
            flex-direction: column;
        }

        .meta-label {
            color: var(--primary-color);
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .meta-value {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1rem;
        }

        .description {
            color: rgba(255, 255, 255, 0.85);
            line-height: 1.8;
            font-size: 1.05rem;
            margin-bottom: 2rem;
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .play-button-large {
            flex: 1;
            padding: 1.2rem 2rem;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            transition: all 0.3s;
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.4);
        }

        .play-button-large:hover {
            opacity: 0.9;
            box-shadow: 0 8px 25px rgba(233, 69, 96, 0.6);
        }

        .like-button {
            padding: 1.2rem 2rem;
            background: rgba(233, 69, 96, 0.2);
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            font-size: 1rem;
        }

        .like-button:hover {
            background: var(--primary-color);
            color: #fff;
        }

        .like-button.liked {
            background: var(--primary-color);
            color: #fff;
        }

        /* Video Player */
        .video-player {
            width: 100%;
            height: 650px;
            background: #000;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 3rem 0;
            position: relative;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .video-player iframe {
            width: 100%;
            height: 100%;
            border-radius: 15px;
            border: none;
        }

        .play-placeholder {
            font-size: 5rem;
            color: var(--primary-color);
        }

        /* Comments Section */
        .comments-section {
            margin-top: 4rem;
            padding-top: 3rem;
            border-top: 2px solid rgba(255, 255, 255, 0.1);
        }

        .comments-section h2 {
            font-size: 1.6rem;
            margin-bottom: 2rem;
            color: var(--secondary-color);
        }

        .comment-form {
            display: grid;
            gap: 1rem;
            margin-bottom: 2rem;
            background: rgba(255, 255, 255, 0.05);
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .comment-form input,
        .comment-form textarea {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 1rem;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
        }

        .comment-form input::placeholder,
        .comment-form textarea::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .comment-form input:focus,
        .comment-form textarea:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.12);
            border-color: var(--primary-color);
        }

        .comment-submit {
            padding: 1rem 2rem;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: opacity 0.3s;
            box-shadow: 0 4px 12px rgba(233, 69, 96, 0.3);
        }

        .comment-submit:hover {
            opacity: 0.9;
        }

        .comments-list {
            display: grid;
            gap: 1.5rem;
        }

        .comment-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }

        .comment-item:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .comment-author {
            font-weight: bold;
            color: var(--secondary-color);
            margin-bottom: 0.5rem;
            font-size: 1.05rem;
        }

        .comment-text {
            color: rgba(255, 255, 255, 0.85);
            line-height: 1.6;
            margin-bottom: 0.8rem;
        }

        .comment-meta {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .empty-comments {
            text-align: center;
            padding: 2rem;
            color: rgba(255, 255, 255, 0.5);
        }

        /* Footer */
        footer {
            background: rgba(0, 0, 0, 0.98);
            padding: 2.5rem;
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 3rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        footer a {
            color: var(--primary-color);
            text-decoration: none;
            transition: color 0.3s;
        }

        footer a:hover {
            color: var(--secondary-color);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .film-header {
                grid-template-columns: 1fr;
            }

            .film-details h1 {
                font-size: 2rem;
            }

            .video-player {
                height: 350px;
            }

            .film-meta {
                grid-template-columns: 1fr;
            }

            .action-buttons {
                flex-direction: column;
            }

            .play-button-large,
            .like-button {
                width: 100%;
            }

            .film-poster-large {
                height: 350px;
                font-size: 4rem;
            }

            .comment-form {
                padding: 1.5rem;
            }
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-container">
            <button class="back-btn" onclick="history.back()">← Vissza</button>
            <div class="logo" onclick="window.location.href='/'">🎬 FilmVilág</div>
        </div>
    </header>

    <main>
        <div class="film-header">
            <div class="film-poster-large" id="filmPoster">🎬</div>
            <div class="film-details">
                <h1 id="filmTitle">Film cím betöltésben...</h1>
                <div class="film-rating" id="filmRating">★★★★★ 8.0</div>
                <p class="description" id="filmDescription">Film leírása betöltésben...</p>
                <div class="film-meta">
                    <div class="meta-item">
                        <span class="meta-label">📅 Év</span>
                        <span class="meta-value" id="filmYear">-</span>
                    </div>
                    <div class="meta-item">
                        <span class="meta-label">🎬 Kategória</span>
                        <span class="meta-value" id="filmCategory">-</span>
                    </div>
                    <div class="meta-item">
                        <span class="meta-label">👤 Rendező</span>
                        <span class="meta-value" id="filmDirector">-</span>
                    </div>
                    <div class="meta-item">
                        <span class="meta-label">⏱️ Hossz</span>
                        <span class="meta-value" id="filmDuration">-</span>
                    </div>
                </div>
                <div class="action-buttons">
                    <button class="play-button-large" onclick="playFilm()">▶ LEJÁTSZÁS</button>
                    <button class="like-button" id="likeButton" onclick="addLike()">👍 LÁJK (<span id="likeCount">0</span>)</button>
                </div>
            </div>
        </div>

        <div class="video-player" id="videoPlayer" style="display:none;">
            <iframe id="videoFrame" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>

        <!-- Comments Section -->
        <div class="comments-section">
            <h2>💬 Hozzászólások</h2>
            
            <div class="comment-form">
                <input type="text" id="commentName" placeholder="Neved..." maxlength="100">
                <textarea id="commentText" placeholder="Írj egy hozzászólást..."></textarea>
                <button class="comment-submit" onclick="addComment()">✉️ Hozzászólás Küldése</button>
            </div>

            <div class="comments-list" id="commentsContainer">
                <div class="empty-comments">📭 Nincsenek hozzászólások még. Legyél az első!</div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 FilmVilág. Minden jog fenntartva. | 
            <a href="#">Adatvédelem</a> | 
            <a href="#">Felhasználási Feltételek</a>
        </p>
    </footer>

    <script>
        let currentFilm = null;

        // Get film ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const filmId = urlParams.get('id');

        document.addEventListener('DOMContentLoaded', () => {
            if (filmId) {
                loadFilm();
            } else {
                document.querySelector('main').innerHTML = '<h1>❌ Film nem található!</h1>';
            }
        });

        async function loadFilm() {
            try {
                const response = await fetch(`/api/films/${filmId}`);
                const data = await response.json();

                if (data.film) {
                    currentFilm = data.film;
                    displayFilm();
                    displayComments(data.comments, data.totalLikes);
                    updateSEO();
                } else {
                    document.querySelector('main').innerHTML = '<h1>❌ Film nem található!</h1>';
                }
            } catch (err) {
                console.error('Hiba:', err);
                document.querySelector('main').innerHTML = '<h1>❌ Hiba a film betöltésekor!</h1>';
            }
        }

        function displayFilm() {
            if (!currentFilm) return;

            document.getElementById('filmTitle').textContent = currentFilm.title;
            document.getElementById('filmRating').textContent = `★★★★★ ${currentFilm.rating || 8.0}/10`;
            document.getElementById('filmDescription').textContent = currentFilm.description || 'Nincs leírás';
            document.getElementById('filmYear').textContent = currentFilm.year || 'N/A';
            document.getElementById('filmCategory').textContent = currentFilm.category || 'N/A';
            document.getElementById('filmDirector').textContent = currentFilm.director || 'N/A';
            document.getElementById('filmDuration').textContent = currentFilm.duration || 'N/A';
            document.getElementById('filmPoster').textContent = currentFilm.poster_emoji || '🎬';
        }

        function updateSEO() {
            if (!currentFilm) return;

            const title = currentFilm.meta_title || currentFilm.title;
            const description = currentFilm.meta_description || currentFilm.description;
            const keywords = currentFilm.keywords || `${currentFilm.title}, ${currentFilm.category}, film`;

            document.title = title;
            document.getElementById('pageTitle').content = title;
            document.getElementById('metaDescription').content = description;
            document.getElementById('metaKeywords').content = keywords;
            
            document.getElementById('canonical').href = window.location.href;
            document.getElementById('ogUrl').content = window.location.href;

            document.getElementById('ogTitle').content = currentFilm.og_title || currentFilm.title;
            document.getElementById('ogDescription').content = currentFilm.og_description || description;
            document.getElementById('twitterTitle').content = currentFilm.title;
            document.getElementById('twitterDescription').content = description;

            // Schema Markup
            const schema = {
                "@context": "https://schema.org",
                "@type": "Movie",
                "name": currentFilm.title,
                "description": currentFilm.description,
                "datePublished": `${currentFilm.year || 2024}-01-01`,
                "director": {
                    "@type": "Person",
                    "name": currentFilm.director || "Ismeretlen"
                },
                "duration": currentFilm.duration || "PT120M",
                "genre": currentFilm.category,
                "aggregateRating": {
                    "@type": "AggregateRating",
                    "ratingValue": currentFilm.rating || 8.0,
                    "bestRating": "10",
                    "worstRating": "1"
                }
            };

            document.getElementById('schemaMarkup').textContent = JSON.stringify(schema);
        }

        function playFilm() {
            if (!currentFilm || !currentFilm.video_link) {
                alert('❌ Video nem elérhető!');
                return;
            }

            const videoPlayer = document.getElementById('videoPlayer');
            const videoFrame = document.getElementById('videoFrame');

            videoFrame.src = currentFilm.video_link;
            videoPlayer.style.display = 'flex';
            videoFrame.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function displayComments(comments, totalLikes) {
            const container = document.getElementById('commentsContainer');
            document.getElementById('likeCount').textContent = totalLikes;

            if (!comments || comments.length === 0) {
                container.innerHTML = '<div class="empty-comments">📭 Nincsenek hozzászólások még. Legyél az első!</div>';
                return;
            }

            container.innerHTML = '';
            comments.forEach(comment => {
                const commentEl = document.createElement('div');
                commentEl.className = 'comment-item';
                const date = new Date(comment.created_at).toLocaleString('hu-HU');
                commentEl.innerHTML = `
                    <div class="comment-author">👤 ${comment.user_name}</div>
                    <div class="comment-text">${comment.comment_text}</div>
                    <div class="comment-meta">📅 ${date}</div>
                `;
                container.appendChild(commentEl);
            });
        }

        async function addComment() {
            const name = document.getElementById('commentName').value.trim();
            const text = document.getElementById('commentText').value.trim();

            if (!name || !text) {
                alert('❌ Kérjük, töltsd ki az összes mezőt!');
                return;
            }

            try {
                const response = await fetch('/api/comments', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        film_id: filmId,
                        user_name: name,
                        comment_text: text
                    })
                });

                if (response.ok) {
                    document.getElementById('commentName').value = '';
                    document.getElementById('commentText').value = '';
                    loadFilm();
                    alert('✅ Hozzászólás elküldve!');
                } else {
                    alert('❌ Hiba a hozzászólás küldésekor!');
                }
            } catch (err) {
                console.error('Hiba:', err);
                alert('❌ Hiba!');
            }
        }

        async function addLike() {
            try {
                const response = await fetch('/api/likes', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ film_id: filmId })
                });

                const data = await response.json();

                if (data.success) {
                    document.getElementById('likeCount').textContent = data.totalLikes;
                    document.getElementById('likeButton').classList.add('liked');
                    alert('✅ Lájk hozzáadva!');
                } else {
                    alert('⚠️ ' + data.error);
                }
            } catch (err) {
                console.error('Hiba:', err);
                alert('❌ Hiba!');
            }
        }
    </script>
</body>
</html>
